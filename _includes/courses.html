<div class="grid-item">
  {% if course.redirect %}
  <a href="{{ course.redirect }}" target="_blank">
  {% else %}
  <a href="{{ course.url | relative_url }}">
  {% endif %}
    <div class="card hoverable">
      {% if course.img %}
      <img src="{{ course.img | relative_url }}" alt="course thumbnail">
      {% endif %}
      <div class="card-body">
        <h2 class="card-title text-lowercase">{{ course.thumbtitle }}</h2>
        <p class="card-text">{{ course.description }}</p>
        {% if course.tags %}
        <div class="row ml-1 mr-1 p-0 mb-1">
          {% for tag in course.tags %}
          <span class="tag-badge">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
        <div class="row ml-1 mr-1 p-0">
          {% if course.github %}
          <div class="github-icon">
            <div class="icon" data-toggle="tooltip" title="Code Repository">
              <a href="{{ course.github }}" target="_blank"><i class="fab fa-github gh-icon"></i></a>
            </div>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </a>
</div>

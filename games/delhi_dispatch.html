<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kicking the Anti-Nationals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1923;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      user-select: none;
    }
    canvas {
      cursor: crosshair;
      border: 3px solid #FF8C00;
      box-shadow: 0 0 40px rgba(255,140,0,0.5);
      display: block;
    }
    #hint {
      color: #888;
      font-size: 12px;
      margin-top: 8px;
      font-family: monospace;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<canvas id="game" width="900" height="600"></canvas>
<div id="hint">WASD / Arrows – Move &nbsp;|&nbsp; K / Space – KICK &nbsp;|&nbsp; Click – Catch chamchas!</div>
<script>
/* ================================================================
   KICKING THE ANTI-NATIONALS  –  A Political Street-Patrol Web Game
   Controls: WASD/Arrows | K or Space = KICK | Click = Catch
   Goal: Catch all chamchas & find Pappu the leader
   ================================================================ */

(function () {
'use strict';

// ── AUDIO (Web Audio API – no external files) ──────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new AudioCtx(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function schedTone(ac, freq, type, vol, start, dur, freqEnd) {
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, start);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.start(start); o.stop(start + dur + 0.02);
}
function sfxKick() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  schedTone(ac, 320, 'square',   0.28, t,        0.06, 80);
  schedTone(ac, 110, 'sawtooth', 0.22, t + 0.04, 0.15);
}
function sfxCatch() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  [440, 554, 659].forEach((f, i) => schedTone(ac, f, 'sine', 0.25, t + i * 0.09, 0.10));
}
function sfxPenalty() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  [280, 180].forEach((f, i) => schedTone(ac, f, 'square', 0.22, t + i * 0.16, 0.18));
}
function sfxPappu() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  [523, 659, 784, 1047, 1319].forEach((f, i) => schedTone(ac, f, 'sine', 0.30, t + i * 0.10, 0.14));
}
function sfxLevelComplete() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => schedTone(ac, f, 'sine', 0.28, t + i * 0.13, 0.15));
  schedTone(ac, 1047, 'sine', 0.25, t + 0.58, 0.45);
}
function sfxPowerUp() {
  const ac = ensureAudio(); if (!ac) return;
  const t = ac.currentTime;
  [600, 800, 1000, 1200, 1500, 1800].forEach((f, i) => schedTone(ac, f, 'sine', 0.18, t + i * 0.055, 0.08));
}
function sfxTimerWarn() {
  const ac = ensureAudio(); if (!ac) return;
  schedTone(ac, 880, 'square', 0.12, ac.currentTime, 0.07);
}

// ── roundRect polyfill ─────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ── Canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 900, H = 600;
const WORLD_W  = 4500;
const GROUND_Y = 510;
const STREET_Y = 420;

// ── Palettes ───────────────────────────────────────────────────
const SKINS     = ['#C68642','#8D5524','#D4A76A','#A0522D','#c4a35a','#b07d42'];
const CSHIRTS   = ['#4682B4','#8B0000','#006400','#4B0082','#FF4500','#2E8B57','#B8860B','#708090','#CD5C5C'];
const CPANTS    = ['#2F4F4F','#1C1C1C','#4a4a6a','#654321','#3a3a3a','#5a4030'];
const SAREE_COL = ['#FF69B4','#8B008B','#DAA520','#FF1493','#1E90FF','#E91E63'];
const BOXER_COL = ['#4169E1','#DC143C','#228B22','#FF8C00','#800080','#00CED1','#E91E63'];

// ── POWER-UPS ──────────────────────────────────────────────────
const PU_TYPES = [
  { id:'speed',      color:'#FF8C00', glow:'rgba(255,140,0,0.55)',  symbol:'⚡', label:'SPEED BOOST!',  duration:6000 },
  { id:'multiplier', color:'#FFD700', glow:'rgba(255,215,0,0.55)',  symbol:'★',  label:'2× SCORE!',     duration:8000 },
  { id:'timefreeze', color:'#00BFFF', glow:'rgba(0,191,255,0.55)', symbol:'❄',  label:'TIME FREEZE!',  duration:5000 },
  { id:'stunwave',   color:'#FF4500', glow:'rgba(255,69,0,0.55)',   symbol:'💥', label:'STUN WAVE!',    duration:0    },
];
let powerups = [];
let puSpawnTimer = 0;
const PU_SPAWN_INTERVAL = 14000;

function spawnPowerup() {
  if (powerups.length >= 3) return;
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  powerups.push({ ...type, x: rn(300, WORLD_W - 300), y: GROUND_Y, age: 0, lifetime: 12000 });
}

function applyPowerup(pu) {
  sfxPowerUp();
  gs.msg = pu.label;
  gs.msgTimer = 2200;
  switch (pu.id) {
    case 'speed':
      player.effects.speed = pu.duration;
      player.speed = 8;
      break;
    case 'multiplier':
      player.effects.multiplier = pu.duration;
      break;
    case 'timefreeze':
      player.effects.timefreeze = pu.duration;
      break;
    case 'stunwave': {
      const mul = player.effects.multiplier > 0 ? 2 : 1;
      let count = 0;
      for (const npc of npcs) {
        if (npc.caught) continue;
        const sx = npc.x - gs.cameraX;
        if (sx >= -50 && sx <= W + 50 && (npc.type === 'chamcha' || npc.type === 'pappu')) {
          npc.caught = true; gs.found++;
          gs.score += (npc.type === 'pappu' ? 600 : 250) * mul;
          count++;
        }
      }
      gs.msg = count > 0 ? `STUN WAVE! ${count} caught!` : 'STUN WAVE!';
      gs.msgTimer = 2500;
      break;
    }
  }
}

const SLOGANS = [
  ['PM IS',        'COMPROMISED!'],
  ['VOTE-CHORI!',  '😡'],
  ['WHY',          'TRADE DEAL?'],
  ['WHY NO',       'TRADE DEAL?'],
  ['WE ARE FOOLS', '& STUPID!'],
  ['DESH KE',      'YUVA! ✊'],
];

// ── Levels ─────────────────────────────────────────────────────
const LEVELS = [
  { name:'Jantar Mantar',     sub:'The Iconic Protest Grounds',
    chamchas:3, innocents:8,  timeLimit:65, hasPappu:false, bgStyle:'jantar'     },
  { name:'Connaught Place',   sub:'The Commercial Circle',
    chamchas:4, innocents:12, timeLimit:60, hasPappu:false, bgStyle:'cp'         },
  { name:'Parliament Street', sub:'The Power Corridor',
    chamchas:5, innocents:15, timeLimit:55, hasPappu:false, bgStyle:'parliament' },
  { name:'India Gate Lawns',  sub:'The National Memorial',
    chamchas:6, innocents:18, timeLimit:50, hasPappu:false, bgStyle:'indiagate'  },
  { name:'Rajpath Boulevard', sub:'Find Pappu the Leader!',
    chamchas:7, innocents:20, timeLimit:45, hasPappu:true,  bgStyle:'rajpath'    },
];

// ── Game state ─────────────────────────────────────────────────
let gs = {
  phase: 'menu',
  level: 0,
  score: 0, totalScore: 0,
  time: 60,
  cameraX: 0,
  found: 0, needed: 0,
  msg: '', msgTimer: 0,
};

// ── Player ─────────────────────────────────────────────────────
let player = {};
function initPlayer() {
  player = {
    x: W / 2 + 200, y: GROUND_Y,
    speed: 4, frame: 0, frameTimer: 0, facing: 1,
    kickCooldown: 0,
    kickAnim: 0,
    KICK_CD: 1500,
    KICK_DUR: 380,
    effects: { speed: 0, multiplier: 0, timefreeze: 0 },
  };
}

// ── NPCs ───────────────────────────────────────────────────────
let npcs = [];
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rn(lo, hi) { return lo + Math.random() * (hi - lo); }

function makeNPC(type, x) {
  const speedMap = { innocent: rn(0.35, 0.9), chamcha: rn(0.4, 1.0), pappu: rn(0.6, 1.1) };
  const o = {
    type, x,
    y: GROUND_Y,
    vx: 0,
    vxTarget: 0,
    maxSpeed: speedMap[type] || 0.7,
    frame: 0, frameTimer: rn(0, 30) * 10,
    facing: Math.random() > 0.5 ? 1 : -1,
    skin: rand(SKINS),
    caught: false, catchAge: 0,
    exclaimTimer: 0,
    wanderTimer: rn(1500, 4000) | 0,
    idleTimer: 0,
  };
  if (type === 'innocent') {
    o.shirtColor = rand(CSHIRTS);
    o.pantColor  = rand(CPANTS);
    o.isSaree    = Math.random() < 0.3;
    o.sareeColor = rand(SAREE_COL);
    o.hasGlasses = Math.random() < 0.2;
  } else if (type === 'chamcha') {
    o.boxerColor   = rand(BOXER_COL);
    o.boxerStripes = Math.random() < 0.5;
    o.slogan       = rand(SLOGANS);
    o.hasSign      = true;
  } else if (type === 'pappu') {
    o.spotted = false;
  }
  return o;
}

// ── Level init ─────────────────────────────────────────────────
function initLevel(idx) {
  const lv = LEVELS[idx];
  gs.level = idx; gs.phase = 'playing';
  gs.time = lv.timeLimit;
  gs.cameraX = 0;
  gs.found = 0; gs.needed = lv.chamchas + (lv.hasPappu ? 1 : 0);
  gs.msg = ''; gs.msgTimer = 0;
  gs.timerWarnPlayed = false;
  initPlayer();
  npcs = [];
  powerups = [];
  puSpawnTimer = PU_SPAWN_INTERVAL * 0.55;
  for (let i = 0; i < lv.innocents; i++) npcs.push(makeNPC('innocent', rn(300, WORLD_W - 300)));
  for (let i = 0; i < lv.chamchas;  i++) npcs.push(makeNPC('chamcha',  rn(300, WORLD_W - 300)));
  if (lv.hasPappu) npcs.push(makeNPC('pappu', rn(800, WORLD_W - 800)));
}

// ── Keys ───────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if ((e.code === 'Space' || e.code === 'Enter') && gs.phase !== 'playing') advance();
  if ((e.code === 'Space' || e.code === 'KeyK')  && gs.phase === 'playing')  tryKick();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function advance() {
  if (gs.phase === 'menu') { initLevel(0); return; }
  if (gs.phase === 'levelComplete') {
    if (gs.level < LEVELS.length - 1) { gs.score = 0; initLevel(gs.level + 1); }
    else { gs.phase = 'win'; }
    return;
  }
  if (gs.phase === 'gameOver' || gs.phase === 'win') {
    gs.totalScore = 0; gs.score = 0; gs.phase = 'menu';
  }
}

// ── Kick logic ─────────────────────────────────────────────────
function tryKick() {
  if (player.kickCooldown > 0) return;
  player.kickCooldown = player.KICK_CD;
  player.kickAnim    = player.KICK_DUR;
  sfxKick();

  const RANGE_X = 95, RANGE_Y = 38;
  const mul = player.effects.multiplier > 0 ? 2 : 1;
  let hit = false;
  for (const npc of npcs) {
    if (npc.caught) continue;
    const dx = (npc.x - player.x) * player.facing;
    const dy = Math.abs(npc.y - player.y);
    if (dx > -15 && dx < RANGE_X && dy < RANGE_Y) {
      hit = true;
      if (npc.type === 'chamcha' || npc.type === 'pappu') {
        npc.caught = true;
        gs.found++;
        const base = npc.type === 'pappu' ? 600 : 250;
        const pts = base * mul;
        gs.score += pts;
        npc.type === 'pappu' ? sfxPappu() : sfxCatch();
        gs.msg = npc.type === 'pappu'
          ? `PAPPU KICKED OUT! +${pts} pts!`
          : `KICK CONNECTS! +${pts} pts!  (${gs.found}/${gs.needed})`;
        gs.msgTimer = 2200;
      } else {
        sfxPenalty();
        gs.score = Math.max(0, gs.score - 75);
        gs.msg = 'Kicked an innocent! -75 pts!';
        gs.msgTimer = 1500;
        npc.exclaimTimer = 1400;
      }
      break;
    }
  }
  if (!hit) {
    gs.msg = 'Kick missed!';
    gs.msgTimer = 700;
  }
}

// ── Click handler ──────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (gs.phase !== 'playing') { advance(); return; }
  const r  = canvas.getBoundingClientRect();
  const sx = e.clientX - r.left;
  const sy = e.clientY - r.top;
  const mul = player.effects.multiplier > 0 ? 2 : 1;
  for (const npc of npcs) {
    if (npc.caught) continue;
    const nx = npc.x - gs.cameraX;
    if (Math.abs(sx - nx) < 26 && Math.abs(sy - (npc.y - 38)) < 45) {
      if (npc.type === 'chamcha' || npc.type === 'pappu') {
        npc.caught = true; gs.found++;
        const base = npc.type === 'pappu' ? 500 : 200;
        const pts = base * mul;
        gs.score += pts;
        npc.type === 'pappu' ? sfxPappu() : sfxCatch();
        gs.msg = npc.type === 'pappu'
          ? `Pappu Caught! +${pts} pts!`
          : `Chamcha Found! +${pts} pts!  (${gs.found}/${gs.needed})`;
        gs.msgTimer = 2500;
      } else {
        sfxPenalty();
        gs.score = Math.max(0, gs.score - 50);
        gs.msg = 'Wrong person! -50 pts';
        gs.msgTimer = 1500;
        npc.exclaimTimer = 1200;
      }
      break;
    }
  }
});

// ── Update ─────────────────────────────────────────────────────
let lastTime = 0, timeAccum = 0;

function update(dt) {
  if (gs.phase !== 'playing') return;

  timeAccum += dt;
  if (timeAccum >= 1000 && player.effects.timefreeze <= 0) {
    timeAccum -= 1000;
    gs.time--;
    if (gs.time <= 10) sfxTimerWarn();
  } else if (player.effects.timefreeze > 0) {
    timeAccum = Math.min(timeAccum, 999);
  }
  if (gs.time <= 0) { gs.phase = 'gameOver'; return; }

  if (player.kickCooldown > 0) player.kickCooldown -= dt;
  if (player.kickAnim > 0)     player.kickAnim     -= dt;

  let moved = false;
  if (keys['ArrowLeft'] || keys['KeyA']) { player.x -= player.speed; player.facing = -1; moved = true; }
  if (keys['ArrowRight']|| keys['KeyD']) { player.x += player.speed; player.facing =  1; moved = true; }
  if (keys['ArrowUp']   || keys['KeyW']) { if (player.y > GROUND_Y - 25) player.y -= 2; moved = true; }
  if (keys['ArrowDown'] || keys['KeyS']) { if (player.y < GROUND_Y + 8)  player.y += 2; moved = true; }
  player.x = Math.max(80, Math.min(WORLD_W - 80, player.x));

  const targetCam = player.x - W / 2;
  gs.cameraX += (targetCam - gs.cameraX) * 0.12;
  gs.cameraX = Math.max(0, Math.min(WORLD_W - W, gs.cameraX));

  if (moved && player.kickAnim <= 0) {
    player.frameTimer += dt;
    if (player.frameTimer > 150) { player.frameTimer = 0; player.frame ^= 1; }
  } else if (!moved) { player.frame = 0; }

  for (const npc of npcs) {
    if (npc.caught) { npc.catchAge += dt; continue; }

    if (npc.idleTimer > 0) {
      npc.idleTimer -= dt;
      npc.vxTarget = 0;
    } else {
      npc.wanderTimer -= dt;
      if (npc.wanderTimer <= 0) {
        npc.wanderTimer = rn(1800, 5000) | 0;
        if (Math.random() < 0.22) {
          npc.idleTimer  = rn(600, 2200) | 0;
          npc.vxTarget   = 0;
        } else {
          const dir = Math.random() < 0.5 ? 1 : -1;
          npc.vxTarget = dir * npc.maxSpeed * rn(0.5, 1.0);
        }
      }
    }

    if (npc.type === 'pappu') {
      if (Math.abs(npc.x - player.x) < 240) npc.spotted = true;
      if (npc.spotted) npc.vxTarget = npc.x > player.x ? npc.maxSpeed * 1.4 : -npc.maxSpeed * 1.4;
    }

    npc.vx += (npc.vxTarget - npc.vx) * 0.045;
    if (Math.abs(npc.vx) > 0.05) npc.facing = npc.vx > 0 ? 1 : -1;

    npc.x += npc.vx;
    if (npc.x < 80)           { npc.x = 80;           npc.vx = Math.abs(npc.vx) * 0.5; npc.vxTarget = Math.abs(npc.vxTarget); }
    if (npc.x > WORLD_W - 80) { npc.x = WORLD_W - 80; npc.vx = -Math.abs(npc.vx) * 0.5; npc.vxTarget = -Math.abs(npc.vxTarget); }

    if (Math.abs(npc.vx) > 0.1) {
      const interval = Math.max(100, 260 - Math.abs(npc.vx) * 100);
      npc.frameTimer += dt;
      if (npc.frameTimer > interval) { npc.frameTimer = 0; npc.frame ^= 1; }
    } else {
      npc.frame = 0; npc.frameTimer = 0;
    }
    if (npc.exclaimTimer > 0) npc.exclaimTimer -= dt;
  }

  if (gs.msgTimer > 0) gs.msgTimer -= dt;

  // ── Active effects tick ──
  if (player.effects.speed > 0) {
    player.effects.speed -= dt;
    if (player.effects.speed <= 0) { player.effects.speed = 0; player.speed = 4; }
  }
  if (player.effects.multiplier > 0) player.effects.multiplier = Math.max(0, player.effects.multiplier - dt);
  if (player.effects.timefreeze > 0) player.effects.timefreeze = Math.max(0, player.effects.timefreeze - dt);

  // ── Power-up spawn ──
  puSpawnTimer -= dt;
  if (puSpawnTimer <= 0) { puSpawnTimer = PU_SPAWN_INTERVAL; spawnPowerup(); }

  // ── Power-up collection & expiry ──
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.age += dt;
    if (pu.age >= pu.lifetime) { powerups.splice(i, 1); continue; }
    if (Math.abs(player.x - pu.x) < 32 && Math.abs(player.y - pu.y) < 32) {
      applyPowerup(pu);
      powerups.splice(i, 1);
    }
  }

  if (npcs.filter(n => !n.caught && (n.type === 'chamcha' || n.type === 'pappu')).length === 0) {
    gs.totalScore += gs.score + gs.time * 10;
    gs.phase = 'levelComplete';
    sfxLevelComplete();
  }
}

// ================================================================
//  CHARACTER DRAWING
// ================================================================

function legOff(frame, amp) { return frame === 1 ? amp : 0; }

function drawEyes(x, y) {
  ctx.fillStyle = '#111';
  ctx.fillRect(x - 5, y - 1, 3, 3);
  ctx.fillRect(x + 2, y - 1, 3, 3);
}

// ── PROTAGONIST – 75-year-old BJP man ──────────────────────────
function drawProtagonist(wx, wy, frame, facing) {
  const sx = wx - gs.cameraX;
  const sy = wy;
  if (sx < -80 || sx > W + 80) return;

  ctx.save();

  // Soft radial shadow blob
  const protShadow = ctx.createRadialGradient(sx, sy + 4, 0, sx, sy + 4, 18);
  protShadow.addColorStop(0, 'rgba(0,0,0,0.32)');
  protShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = protShadow;
  ctx.beginPath(); ctx.ellipse(sx, sy + 4, 18, 6, 0, 0, Math.PI * 2); ctx.fill();

  const isKicking = player.kickAnim > 0;
  const kickProg  = isKicking ? Math.sin((1 - player.kickAnim / player.KICK_DUR) * Math.PI) : 0;
  const lo        = legOff(frame, 5);
  const f         = facing;

  // ── LEGS (pyjama) ──
  ctx.fillStyle = '#F0EFE0';
  if (isKicking) {
    ctx.fillRect(sx - 13 * f, sy - 26, 12, 29);
    ctx.save();
    ctx.translate(sx + 6 * f, sy - 26);
    ctx.rotate(-kickProg * 1.15 * f);
    ctx.fillRect(-5, 0, 11, 30);
    ctx.restore();
    if (kickProg > 0.4) {
      ctx.fillStyle = '#7a5c3a';
      const bx = sx + 6 * f + Math.sin(kickProg * 1.15) * 30 * f;
      const by = sy - 26 + Math.cos(kickProg * 1.15) * 30;
      ctx.beginPath(); ctx.ellipse(bx + 8 * f, by + 2, 10, 6, -kickProg * 0.6 * f, 0, Math.PI * 2); ctx.fill();
    }
  } else {
    ctx.fillRect(sx - 14, sy - 26, 12, 29 + lo * f);
    ctx.fillRect(sx +  2, sy - 26, 12, 29 - lo * f + (f < 0 ? lo * 2 : 0));
  }

  // ── KURTA BODY (base layer) – subtle L→R gradient ──
  const kurtaGrad = ctx.createLinearGradient(sx - 16, 0, sx + 16, 0);
  kurtaGrad.addColorStop(0,   '#EDE3C6');
  kurtaGrad.addColorStop(0.5, '#F5EDD8');
  kurtaGrad.addColorStop(1,   '#DECCA8');
  ctx.fillStyle = kurtaGrad;
  ctx.roundRect(sx - 16, sy - 65, 32, 44, 4); ctx.fill();

  // ── SAFFRON CLOSED VEST (over kurta) – L→R saffron gradient ──
  const vestGrad = ctx.createLinearGradient(sx - 16, 0, sx + 16, 0);
  vestGrad.addColorStop(0,   '#A03800');
  vestGrad.addColorStop(0.5, '#D85800');
  vestGrad.addColorStop(1,   '#B04000');
  ctx.fillStyle = vestGrad;
  ctx.roundRect(sx - 16, sy - 65, 32, 44, 3); ctx.fill();
  // V-neck opening revealing kurta underneath
  ctx.fillStyle = '#F5EDD8';
  ctx.beginPath();
  ctx.moveTo(sx - 8, sy - 65);
  ctx.lineTo(sx,     sy - 50);
  ctx.lineTo(sx + 8, sy - 65);
  ctx.fill();
  // Collar detail
  ctx.fillStyle = '#EDE0C8';
  ctx.beginPath();
  ctx.moveTo(sx - 5, sy - 65); ctx.lineTo(sx, sy - 57); ctx.lineTo(sx + 5, sy - 65);
  ctx.fill();
  // Vest buttons
  ctx.fillStyle = '#7A2E00';
  ctx.beginPath(); ctx.arc(sx, sy - 44, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy - 35, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy - 26, 2, 0, Math.PI * 2); ctx.fill();
  // Vest outline stitch
  ctx.strokeStyle = '#7A2E00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(sx - 16, sy - 65, 32, 44, 3); ctx.stroke();

  // ── ARMS (kurta sleeves) ──
  ctx.fillStyle = '#F5EDD8';
  ctx.fillRect(sx - 22, sy - 63, 8, 28);
  ctx.fillRect(sx + 14, sy - 63, 8, 28);

  // ── HEAD – 75 year old – radial skin gradient ──
  const headGrad = ctx.createRadialGradient(sx - 3, sy - 83, 1, sx, sy - 80, 13);
  headGrad.addColorStop(0, '#D89A5C');
  headGrad.addColorStop(1, '#A86830');
  ctx.fillStyle = headGrad;
  ctx.beginPath(); ctx.arc(sx, sy - 80, 12, 0, Math.PI * 2); ctx.fill();

  // White/silver hair – fuller, side-parted (not wispy receding)
  ctx.fillStyle = '#D0D0D0';
  ctx.beginPath(); ctx.arc(sx, sy - 80, 12, Math.PI * 1.08, 0.08); ctx.fill();
  ctx.fillStyle = '#C0C0C0';
  ctx.beginPath(); ctx.arc(sx - 2, sy - 88, 10, Math.PI * 0.88, Math.PI * 1.7); ctx.fill();
  // Hair texture strokes
  ctx.strokeStyle = '#AAAAAA'; ctx.lineWidth = 0.9;
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(sx - 11 + i * 4, sy - 87);
    ctx.quadraticCurveTo(sx - 9 + i * 4, sy - 93, sx - 7 + i * 4, sy - 88);
    ctx.stroke();
  }

  // Natural beard – shaped path following the jawline, not a flat arc
  ctx.fillStyle = '#DCDCDC';
  ctx.beginPath();
  ctx.moveTo(sx - 11, sy - 76);
  ctx.quadraticCurveTo(sx - 14, sy - 70, sx - 9,  sy - 63);
  ctx.quadraticCurveTo(sx - 3,  sy - 60, sx,      sy - 59);
  ctx.quadraticCurveTo(sx + 3,  sy - 60, sx + 9,  sy - 63);
  ctx.quadraticCurveTo(sx + 14, sy - 70, sx + 11, sy - 76);
  ctx.closePath();
  ctx.fill();
  // Inner beard layer for depth
  ctx.fillStyle = '#C8C8C8';
  ctx.beginPath();
  ctx.moveTo(sx - 8, sy - 75);
  ctx.quadraticCurveTo(sx - 10, sy - 69, sx - 6, sy - 63);
  ctx.quadraticCurveTo(sx,      sy - 62, sx + 6, sy - 63);
  ctx.quadraticCurveTo(sx + 10, sy - 69, sx + 8, sy - 75);
  ctx.closePath();
  ctx.fill();
  // Beard hair lines
  ctx.strokeStyle = '#AAAAAA'; ctx.lineWidth = 0.7;
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(sx - 7 + i * 2.8, sy - 74);
    ctx.lineTo(sx - 6 + i * 2.8, sy - 62);
    ctx.stroke();
  }
  // Moustache (slightly darker grey)
  ctx.fillStyle = '#B8B8B8';
  ctx.beginPath();
  ctx.ellipse(sx, sy - 77, 6, 2.5, 0, 0, Math.PI); ctx.fill();

  // Eyes
  drawEyes(sx, sy - 82);

  // Round Gandhi-style spectacles
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(sx - 5, sy - 82, 4.5, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx + 5, sy - 82, 4.5, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx - 0.5, sy - 82); ctx.lineTo(sx + 0.5, sy - 82); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx - 9.5, sy - 82); ctx.lineTo(sx - 13, sy - 81); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx + 9.5, sy - 82); ctx.lineTo(sx + 13, sy - 81); ctx.stroke();

  // ── KICK VFX ──
  if (isKicking && kickProg > 0.3) {
    ctx.fillStyle = '#FF2200';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    const vfxX = sx + 55 * f;
    const vfxY = sy - 40 - kickProg * 12;
    ctx.fillText('KICK!', vfxX, vfxY);
    if (kickProg > 0.55) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '16px Arial';
      ctx.fillText('★', vfxX + 22 * f, vfxY - 10);
      ctx.fillText('✦', vfxX - 18 * f, vfxY + 8);
    }
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

  vestCGrad.addColorStop(0.5, '#FFFFF5');

  ctx.roundRect(sx - 13, sy - 63, 26, 28, 3); ctx.fill();

  ctx.fillRect(sx +  6, sy - 68, 7, 8);   // right strap
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx - 4, sy - 62); ctx.lineTo(sx, sy - 56); ctx.lineTo(sx + 4, sy - 62);
  ctx.stroke();

  // ── ARMS ──
  ctx.fillStyle = skin;
  ctx.fillRect(sx - 20, sy - 63, 8, 26);
  ctx.fillRect(sx + 12, sy - 63, 8, 26);

  // ── HEAD ──
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(sx, sy - 78, 11, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath(); ctx.arc(sx, sy - 84, 11, Math.PI, 0); ctx.fill();
  // Angry V-eyebrows
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx - 8, sy - 82); ctx.lineTo(sx - 3, sy - 80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx + 8, sy - 82); ctx.lineTo(sx + 3, sy - 80); ctx.stroke();
  drawEyes(sx, sy - 79);

  // ── PROTEST PLACARD ──
  ctx.strokeStyle = skin; ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(sx + 14, sy - 54); ctx.lineTo(sx + 22, sy - 76); ctx.stroke();
  ctx.strokeStyle = '#8B6040'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx + 22, sy - 76); ctx.lineTo(sx + 22, sy - 112); ctx.stroke();
  const bw = 66, bh = 34;
  const bx = sx + 22 - bw / 2;
  const by = sy - 112 - bh;
  ctx.fillStyle = '#FFF9E8';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#CC3300'; ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#CC3300';
  ctx.fillRect(bx, by, 4, bh);
  const slines = npc.slogan;
  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';
  const lineH = bh / (slines.length + 0.5);
  slines.forEach((line, i) => {
    ctx.font = `bold ${slines.length === 1 ? 8 : 7}px Arial`;
    ctx.fillText(line, bx + bw / 2, by + lineH * (i + 1));

  ctx.textAlign = 'left';

  if (npc.exclaimTimer > 0) {
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('?', sx, sy - 122);
    ctx.textAlign = 'left';

  ctx.restore();
}

// ── Colour utilities ────────────────────────────────────────────
function darken(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.max(0,((n>>16)&255)-amt)},${Math.max(0,((n>>8)&255)-amt)},${Math.max(0,(n&255)-amt)})`;
}
function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.min(255,((n>>16)&255)+amt)},${Math.min(255,((n>>8)&255)+amt)},${Math.min(255,(n&255)+amt)})`;
}

// ================================================================
//  BACKGROUND – LUTYENS DELHI
// ================================================================
function drawBackground(camX) {
  // 5-stop warm Delhi haze sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, STREET_Y);
  sky.addColorStop(0,    '#2e5a8a');  // deep blue zenith
  sky.addColorStop(0.28, '#5c9ec0');  // mid blue
  sky.addColorStop(0.58, '#c8a06a');  // warm ochre
  sky.addColorStop(0.82, '#d4a858');  // golden horizon
  sky.addColorStop(1,    '#c0904a');  // hazy street-level warmth
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, STREET_Y);

  // Sun – soft radial glow corona (no sharp spokes)
  const sunX = 820, sunY = 65;
  const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 95);
  sunGlow.addColorStop(0,    'rgba(255,245,160,1)');
  sunGlow.addColorStop(0.22, 'rgba(255,220,80,0.85)');
  sunGlow.addColorStop(0.5,  'rgba(255,170,30,0.38)');
  sunGlow.addColorStop(1,    'rgba(255,130,0,0)');
  ctx.fillStyle = sunGlow;
  ctx.beginPath(); ctx.arc(sunX, sunY, 95, 0, Math.PI * 2); ctx.fill();
  // Solid sun disc
  ctx.fillStyle = '#FFE868';
  ctx.beginPath(); ctx.arc(sunX, sunY, 34, 0, Math.PI * 2); ctx.fill();

  // Horizon smog overlay
  const smog = ctx.createLinearGradient(0, STREET_Y - 70, 0, STREET_Y);
  smog.addColorStop(0, 'rgba(200,148,70,0)');
  smog.addColorStop(1, 'rgba(175,115,50,0.30)');
  ctx.fillStyle = smog; ctx.fillRect(0, STREET_Y - 70, W, 70);

  drawCloud(camX, 190, 90, 1.0);
  drawCloud(camX, 420, 75, 0.8);
  drawCloud(camX, 660, 105, 1.2);

  const bStyle = LEVELS[gs.level].bgStyle;
  const bW = 600;
  const pCamX = camX * 0.85;
  const first  = Math.floor(pCamX / bW) - 1;
  for (let s = first; s <= first + 4; s++) {
    const bx = s * bW - pCamX;
    switch (bStyle) {
      case 'jantar':     drawJantar(bx);     break;
      case 'cp':         drawCP(bx);         break;
      case 'parliament': drawParliament(bx); break;
      case 'indiagate':  drawIndiaGate(bx);  break;
      case 'rajpath':    drawRajpath(bx);    break;
    }
  }

  // Road – 3-stop gradient
  const road = ctx.createLinearGradient(0, STREET_Y, 0, H);
  road.addColorStop(0,   '#909090');
  road.addColorStop(0.38,'#6e6e6e');
  road.addColorStop(1,   '#505050');
  ctx.fillStyle = road; ctx.fillRect(0, STREET_Y, W, H - STREET_Y);
  // Specular gloss strip at top of road
  const gloss = ctx.createLinearGradient(0, STREET_Y, 0, STREET_Y + 20);
  gloss.addColorStop(0, 'rgba(255,255,255,0.20)');
  gloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gloss; ctx.fillRect(0, STREET_Y, W, 20);
  // Lane dashes with glow
  ctx.save();
  ctx.shadowColor = '#D8C840'; ctx.shadowBlur = 9;
  ctx.setLineDash([50, 30]);
  ctx.strokeStyle = '#E0D060'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, STREET_Y + 55); ctx.lineTo(W, STREET_Y + 55); ctx.stroke();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Footpath – 3-stop warm gradient + top edge shadow
  const footpath = ctx.createLinearGradient(0, GROUND_Y - 12, 0, GROUND_Y + 16);
  footpath.addColorStop(0,   '#D8B880');
  footpath.addColorStop(0.5, '#C8A870');
  footpath.addColorStop(1,   '#A88850');
  ctx.fillStyle = footpath; ctx.fillRect(0, GROUND_Y - 12, W, 28);
  const fpEdge = ctx.createLinearGradient(0, GROUND_Y - 12, 0, GROUND_Y - 3);
  fpEdge.addColorStop(0, 'rgba(0,0,0,0.28)');
  fpEdge.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = fpEdge; ctx.fillRect(0, GROUND_Y - 12, W, 10);
  ctx.strokeStyle = '#B09060'; ctx.lineWidth = 1;
  const tileOff = -(camX * 0.98 % 70);
  for (let tx = tileOff; tx < W; tx += 70) ctx.strokeRect(tx, GROUND_Y - 12, 70, 28);

  const ts = 220, tStart = Math.floor(camX / ts) * ts;
  for (let tx = tStart - ts; tx < camX + W + ts; tx += ts) drawTree(tx - camX, GROUND_Y - 10);

function drawCloud(camX, baseX, y, scale) {
  const ox = ((baseX - camX * 0.02) % (W + 200) + W + 200) % (W + 200) - 100;

  const puffs = [[-r,0],[0,-r/2],[r,0],[r*1.5,r/3],[-r*1.5,r/3]];
  // Soft grey shadow below each puff
  ctx.fillStyle = 'rgba(140,120,100,0.20)';
  puffs.forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(ox + dx, y + dy + r * 0.42, r * 0.82, 0, Math.PI * 2); ctx.fill();
  });
  // Main cloud puffs
  ctx.fillStyle = 'rgba(255,255,255,0.84)';
  puffs.forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(ox + dx, y + dy, r, 0, Math.PI * 2); ctx.fill();

  // White highlight arc top-left of the central puff
  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.beginPath();
  ctx.arc(ox - r * 0.28, y - r * 0.28, r * 0.58, Math.PI * 1.08, Math.PI * 1.82);

}

// ================================================================
//  CATCH EFFECTS
// ================================================================
function drawCaughtEffects() {
  for (const npc of npcs) {
    if (!npc.caught) continue;
    const sx = npc.x - gs.cameraX;
    if (sx < -80 || sx > W + 80) continue;
    const age = npc.catchAge;
    if (age < 1200) {
      const progress = age / 1200;
      // Pop scale: starts large and settles to 1.0
      const scale = age < 160 ? 1 + (1 - age / 160) * 0.65 : 1.0;
      ctx.save();
      ctx.globalAlpha = 1 - progress;
      ctx.translate(sx, npc.y - 90 - age / 25);
      ctx.scale(scale, scale);
      const label = npc.type === 'pappu' ? '★ PAPPU CAUGHT!' : '✓ CAUGHT!';
      const color  = npc.type === 'pappu' ? '#FFD700' : '#00FF88';
      ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
      // Dark stroke outline
      ctx.strokeStyle = 'rgba(0,0,0,0.72)'; ctx.lineWidth = 3.5;
      ctx.strokeText(label, 0, 0);
      ctx.fillStyle = color;
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }
  }
}

//  HUD
// ================================================================
function drawHUD() {
  // Dark-blue gradient HUD bar
  const hudGrad = ctx.createLinearGradient(0, 0, 0, 42);
  hudGrad.addColorStop(0, 'rgba(8,18,46,0.92)');
  hudGrad.addColorStop(1, 'rgba(4,10,26,0.84)');
  ctx.fillStyle = hudGrad; ctx.fillRect(0, 0, W, 42);
  // Saffron accent line at bottom of bar
  ctx.fillStyle = '#FF8C00'; ctx.fillRect(0, 41, W, 1);

  ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 15px Georgia';
  ctx.fillText(`📍 ${LEVELS[gs.level].name}`, 10, 26);

  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center'; ctx.fillText(`Score: ${gs.score}`, W / 2, 26); ctx.textAlign = 'left';

  ctx.fillStyle = '#AAD4FF'; ctx.font = '14px Arial';
  ctx.fillText(`Found: ${gs.found}/${gs.needed}`, W / 2 + 70, 26);

  const tc = gs.time <= 10 ? '#FF4444' : gs.time <= 20 ? '#FFA040' : '#44FF88';
  ctx.fillStyle = tc; ctx.font = 'bold 17px Arial';
  ctx.textAlign = 'right'; ctx.fillText(`⏱ ${gs.time}s`, W - 8, 26); ctx.textAlign = 'left';

  // Kick cooldown bar
  const cdRatio = Math.max(0, 1 - player.kickCooldown / player.KICK_CD);
  const barW = 80, barX = W - barW - 8, barY = 48;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(barX, barY, barW, 14);
  if (cdRatio >= 1) {
    ctx.fillStyle = '#FF4444';
  } else {
    const kickBarGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    kickBarGrad.addColorStop(0, '#FF6800');
    kickBarGrad.addColorStop(1, '#CC0000');
    ctx.fillStyle = kickBarGrad;
  }
  ctx.fillRect(barX, barY, barW * cdRatio, 14);
  ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, 14);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
  ctx.fillText(cdRatio >= 1 ? '🦵 KICK READY!' : '🦵 reloading…', barX + barW / 2, barY + 10);
  ctx.textAlign = 'left';

  drawMinimap();

  if (gs.msgTimer > 0) {
    const alpha = Math.min(1, gs.msgTimer / 400);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(10,10,10,0.82)';
    ctx.roundRect(W / 2 - 220, 70, 440, 40, 8); ctx.fill();
    const msgColor = gs.msg.includes('-') ? '#FF4444' : '#FFD700';
    // Subtle coloured glow behind text
    ctx.shadowColor = msgColor; ctx.shadowBlur = 14;
    ctx.fillStyle = msgColor;
    ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
    ctx.fillText(gs.msg, W / 2, 95);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left'; ctx.restore();
  }
}

function drawMinimap() {
  const mmW = 130, mmH = 22, mmX = W - mmW - 8, mmY = 66;
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(mmX, mmY, mmW, mmH);
  for (const npc of npcs) {
    if (npc.caught) continue;
    const nx = mmX + (npc.x / WORLD_W) * mmW;
    ctx.fillStyle = npc.type === 'pappu' ? '#FFD700' : npc.type === 'chamcha' ? '#FF4444' : '#555';
    ctx.fillRect(nx - 1, mmY + 4, 3, mmH - 8);
  }
  const px = mmX + (player.x / WORLD_W) * mmW;
  ctx.fillStyle = '#00FF88'; ctx.fillRect(px - 2, mmY + 2, 4, mmH - 4);
  ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1;
  ctx.strokeRect(mmX, mmY, mmW, mmH);
  ctx.fillStyle = '#999'; ctx.font = '9px Arial';
  ctx.fillText('MAP', mmX + 2, mmY - 2);
}

// ── Power-up rendering ──────────────────────────────────────────
function drawPowerUps() {
  for (const pu of powerups) {
    const sx = pu.x - gs.cameraX;
    if (sx < -40 || sx > W + 40) continue;
    const bob = Math.sin(pu.age * 0.003) * 5;
    const sy  = pu.y - 28 + bob;
    const fade = Math.min(1, (pu.lifetime - pu.age) / 2000);

    ctx.save();
    ctx.globalAlpha = fade;

    // Glow halo
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 24);
    grd.addColorStop(0, pu.glow);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(sx, sy, 24, 0, Math.PI * 2); ctx.fill();

    // Dark circle
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(sx, sy, 16, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = pu.color; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(sx, sy, 16, 0, Math.PI * 2); ctx.stroke();

    // Symbol
    ctx.fillStyle = pu.color;
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(pu.symbol, sx, sy + 5);
    ctx.textAlign = 'left';

    ctx.restore();
  }
}

  const defs = [

  ctx.fillText('HOW TO PLAY', W / 2, 152);
  ctx.strokeStyle = 'rgba(255,215,0,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W / 2 - 90, 159); ctx.lineTo(W / 2 + 90, 159); ctx.stroke();

  const instrLines = [
    ['🕹', 'Arrow Keys / WASD — move around'],
    ['🦵', 'K or Space — KICK nearby chamchas!'],
    ['🖱', 'Click on a CHAMCHA to grab them'],
    ['👕', 'Chamchas: white VEST + BOXER SHORTS'],
    ['👑', 'Level 5: Find PAPPU for +500–600 pts!'],
    ['⚠️', 'Don\'t hit innocents — costs pts!'],
  ];
  ctx.textAlign = 'left';
  instrLines.forEach(([icon, text], i) => {
    const iy = 178 + i * 26;
    ctx.fillStyle = '#FF8C00'; ctx.font = '13px Arial';
    ctx.fillText(icon, W / 2 - 198, iy);
    ctx.fillStyle = '#DDDDDD'; ctx.font = '13px Arial';
    ctx.fillText(text, W / 2 - 172, iy);
  });

  // ── LEVEL TRACK ──
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.roundRect(W / 2 - 215, 352, 430, 60, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(255,140,0,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(W / 2 - 215, 352, 430, 60, 10); ctx.stroke();

  ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
  ctx.fillText('5 LEVELS ACROSS NEW DELHI', W / 2, 369);

  const lvNames = ['Jantar\nMantar','Connaught\nPlace','Parliament\nSt','India\nGate','Rajpath\n(Pappu!)'];
  lvNames.forEach((name, i) => {
    const lx = W / 2 - 180 + i * 90;
    ctx.fillStyle = i === 4 ? '#FFD700' : '#FF8C00';
    ctx.font = i === 4 ? 'bold 10px Arial' : '10px Arial';
    ctx.fillText(`${i + 1}.`, lx, 385);
    const parts = name.split('\n');
    ctx.fillStyle = '#AAAAAA'; ctx.font = '9px Arial';
    parts.forEach((p, pi) => ctx.fillText(p, lx, 395 + pi * 10));
  });

  // ── PLAY BUTTON ──
  ctx.textAlign = 'center';
  const btnGrad = ctx.createLinearGradient(W / 2, 424, W / 2, 476);
  btnGrad.addColorStop(0, '#FF7A00');
  btnGrad.addColorStop(1, '#CC4400');
  ctx.fillStyle = btnGrad;
  ctx.roundRect(W / 2 - 95, 424, 190, 52, 12); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W / 2 - 95, 424, 190, 52, 12); ctx.stroke();
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 24px Georgia';
  ctx.fillText('▶  PLAY', W / 2, 457);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '11px Arial';
  ctx.fillText('Click or Space / Enter', W / 2, 488);
  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 46px Georgia';
  ctx.fillText('Level Complete!', W / 2, 160);
  ctx.fillStyle = '#00FF88'; ctx.font = '26px Georgia';
  ctx.fillText(LEVELS[gs.level].name + ' Cleared!', W / 2, 215);
  ctx.fillStyle = '#FFFFFF'; ctx.font = '20px Arial';
  ctx.fillText(`Level Score:  ${gs.score} pts`, W / 2, 270);
  ctx.fillText(`Time Bonus:   +${gs.time * 10} pts`, W / 2, 305);
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`Running Total:  ${gs.totalScore} pts`, W / 2, 345);
  ctx.fillStyle = '#FF8C00'; ctx.font = '20px Arial';
  const isLast = gs.level >= LEVELS.length - 1;
  ctx.fillText(isLast ? 'Click / Space for Final Score!' : `Click / Space → ${LEVELS[gs.level + 1].name}`, W / 2, 420);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF4444'; ctx.font = 'bold 52px Georgia'; ctx.fillText("Time's Up!", W / 2, 190);
  ctx.fillStyle = '#FFA040'; ctx.font = '24px Arial'; ctx.fillText(LEVELS[gs.level].name, W / 2, 245);
  ctx.fillStyle = '#FFFFFF'; ctx.font = '20px Arial';
  ctx.fillText(`Caught ${gs.found} of ${gs.needed} chamchas`, W / 2, 295);
  ctx.fillText(`Score: ${gs.score} pts`, W / 2, 335);
  ctx.fillStyle = '#FF8C00'; ctx.font = '18px Arial';
  ctx.fillText('Click or Space to Try Again', W / 2, 420);
  ctx.textAlign = 'left';
}

let fwList = [];
function drawWin() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a1f0a'); g.addColorStop(1, '#030a03');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (Math.random() < 0.05) fwList.push({ x: rn(80, W-80), y: rn(40, 220), age:0, color:`hsl(${Math.random()*360},100%,65%)` });
  fwList.forEach((f, i) => {
    f.age += 0.04;
    const r = f.age * 55;
    ctx.fillStyle = f.color; ctx.globalAlpha = Math.max(0, 1 - f.age);
    for (let d = 0; d < 10; d++) {
      const a = (d / 10) * Math.PI * 2;
      ctx.beginPath(); ctx.arc(f.x + Math.cos(a)*r, f.y + Math.sin(a)*r, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (f.age > 1) fwList.splice(i, 1);
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 48px Georgia'; ctx.fillText('Mission Complete!', W/2, 140);
  ctx.fillStyle = '#FF8C00'; ctx.font = '26px Georgia';
  ctx.fillText('All Anti-Nationals Dispersed!', W/2, 195);
  ctx.fillStyle = '#FFFFFF'; ctx.font = '22px Georgia';
  ctx.fillText('BJP Secures the Streets of Delhi!', W/2, 240);
  ctx.fillStyle = '#FFD700'; ctx.font = '26px Arial';
  ctx.fillText(`Final Score: ${gs.totalScore} pts`, W/2, 305);
  const stars = gs.totalScore > 6000 ? 3 : gs.totalScore > 3500 ? 2 : 1;
  ctx.font = '44px Arial'; ctx.fillText('⭐'.repeat(stars), W/2, 368);
  ctx.fillStyle = '#FF8C00'; ctx.font = '20px Arial';
  ctx.fillText('Click or Space to Play Again', W/2, 440);
  ctx.textAlign = 'left';
}

// ================================================================
//  MAIN LOOP
// ================================================================
function render(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  ctx.clearRect(0, 0, W, H);

  if (gs.phase === 'menu') {
    drawMenu();
  } else if (gs.phase === 'playing') {
    drawBackground(gs.cameraX);
    drawPowerUps();
    const sorted = [...npcs].sort((a, b) => a.y - b.y);
    for (const npc of sorted) {
      if (npc.caught) continue;
      if (npc.type === 'innocent') drawInnocent(npc);
      else if (npc.type === 'chamcha') drawChamcha(npc);
      else if (npc.type === 'pappu')   drawPappu(npc);
    }
    drawProtagonist(player.x, player.y, player.frame, player.facing);
    drawCaughtEffects();
    drawVignette();
    drawHUD();
    drawActiveEffects();
    update(dt);
  } else if (gs.phase === 'levelComplete') {
    drawBackground(gs.cameraX); drawLevelComplete();
  } else if (gs.phase === 'gameOver') {
    drawBackground(gs.cameraX); drawGameOver();
  } else if (gs.phase === 'win') {
    drawWin();
  }

  requestAnimationFrame(render);
}

// ── Start ───────────────────────────────────────────────────────
initPlayer();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(render); });

})();
</script>
</body>
</html>
